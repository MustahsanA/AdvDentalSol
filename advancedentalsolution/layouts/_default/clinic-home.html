
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ .Title }} | Advance Dental Solution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        .font-pediatric { font-family: 'Quicksand', sans-serif; }
        .font-restorative { font-family: 'Lora', serif; }
    </style>
</head>
<body class="bg-white">
    <nav class="p-6 border-b {{ if eq .Params.department "pediatric" }}border-[#A8E6CF] text-gray-800{{ else }}border-[#1A2E44] text-[#1A2E44]{{ end }}">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="font-bold text-xl">Advance Dental Solution</a>
            <div class="space-x-6 uppercase tracking-widest text-sm">
                <a href="/pediatrics/" class="hover:underline">Pediatrics</a>
                <a href="/restorative/" class="hover:underline">Prosthodontics</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-16 px-6">
        <div class="max-w-4xl mx-auto">
            <h1 class="{{ if eq .Params.department "pediatric" }}font-pediatric text-[#54b391]{{ else }}font-restorative text-[#1A2E44]{{ end }} text-5xl font-bold mb-6">
                {{ .Title }}
            </h1>
            <div class="prose prose-lg max-w-none">
                {{ .Content }}
            </div>
        </div>
    </main>
</body>
</html>
