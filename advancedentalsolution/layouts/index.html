<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        .font-pediatric { font-family: 'Quicksand', sans-serif; }
        .font-restorative { font-family: 'Lora', serif; }
    </style>
</head>
<body class="antialiased">
    <main class="flex flex-col md:flex-row h-screen w-full overflow-hidden">
        
        <div class="relative w-full md:w-1/2 h-1/2 md:h-full bg-[#A8E6CF] group transition-all duration-500 hover:md:w-[60%] flex items-center justify-center">
            <div class="z-10 text-center p-8">
                <h2 class="font-pediatric text-4xl md:text-6xl font-bold text-gray-800 mb-4">Little Smiles</h2>
                <p class="font-pediatric text-lg text-gray-700 mb-8 max-w-xs mx-auto">Gentle, fun, and specialized care for our youngest patients.</p>
                <a href="/pediatrics/" class="px-8 py-3 bg-white text-gray-800 font-bold rounded-full hover:shadow-xl transition-all font-pediatric">Visit Pediatric Wing</a>
            </div>
            <div class="absolute inset-0 bg-[url('kids-dental-bg.jpg')] bg-cover bg-center opacity-30 group-hover:opacity-50 transition-opacity"></div>
        </div>

        <div class="relative w-full md:w-1/2 h-1/2 md:h-full bg-[#1A2E44] group transition-all duration-500 hover:md:w-[60%] flex items-center justify-center">
            <div class="z-10 text-center p-8 text-white">
                <h2 class="font-restorative text-4xl md:text-6xl font-medium mb-4">Restorative Excellence</h2>
                <p class="font-restorative italic text-lg text-blue-100 mb-8 max-w-xs mx-auto">Mastering the art and science of Crown, Bridge, and Prosthodontics.</p>
                <a href="/restorative/" class="px-8 py-3 bg-white text-[#1A2E44] font-bold rounded-sm hover:bg-blue-50 transition-all font-restorative uppercase tracking-widest">Enter the Suite</a>
            </div>
            <div class="absolute inset-0 bg-[url('prosthodontic-lab-bg.jpg')] bg-cover bg-center opacity-20 group-hover:opacity-40 transition-opacity"></div>
        </div>

    </main>
</body>
</html>
